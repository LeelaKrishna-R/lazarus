poll_interval_seconds: 60
debounce: 2
alerting:
  webhook: ${DISCORD_WEBHOOK_URL}
hosts:
  - name: friday-nuc
    address: friday.example.com
    ssh_user: krishna
    checks:
      - type: reachable
        port: 7777
        timeout_seconds: 5
      - type: http_health
        url: https://friday.example.com/health
        timeout_seconds: 5
      - type: service
        name: friday
        timeout_seconds: 10
    remediation:
      - on: service_down
        service: friday
        action: "systemctl restart friday"
        max_attempts: 2
        cooldown_seconds: 300
